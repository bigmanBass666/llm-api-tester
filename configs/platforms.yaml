# 平台配置
# 所有支持的 API 平台

platforms:
  nvidia:
    name: "nvidia"
    display_name: "NVIDIA NIM"
    base_url: "https://integrate.api.nvidia.com/v1"
    api_key_env: "NVIDIA_API_KEY"
    is_available: true
    description: "NVIDIA NIM 提供的多种开源大模型 API，包含 Qwen、DeepSeek、Llama、GLM 等"
    website: "https://build.nvidia.com"
    models:
      free:
        - id: "qwen/qwen3-coder-480b-a35b-instruct"
          name: "Qwen3 Coder 480B"
        - id: "minimaxai/minimax-m2.7"
          name: "MiniMax M2.7"
        - id: "deepseek-ai/deepseek-v3.1-terminus"
          name: "DeepSeek V3.1"
        - id: "meta/llama-4-maverick-17b-128e-instruct"
          name: "Llama 4 Maverick"
        - id: "moonshotai/kimi-k2-instruct-0905"
          name: "Kimi K2"
        - id: "google/gemma-7b"
          name: "Gemma 7B"
        - id: "microsoft/phi-3-mini-128k-instruct"
          name: "Phi-3 Mini"
        - id: "stepfun-ai/step-3.5-flash"
          name: "Step 3.5 Flash"
          note: "推理模型，复杂问题可能只输出 reasoning"
        - id: "z-ai/glm4.7"
          name: "GLM 4.7"
          note: "推理模型，需要特殊提示词格式"

  aliyun:
    name: "aliyun"
    display_name: "阿里云百炼"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key_env: "DASHSCOPE_API_KEY"
    is_available: false
    description: "阿里云百炼平台，提供通义千问系列模型"
    website: "https://bailian.console.aliyun.com/"
    models:
      free:
        - id: "qwen-turbo"
          name: "通义千问 Turbo"
        - id: "qwen-plus"
          name: "通义千问 Plus"
        - id: "qwen-max"
          name: "通义千问 Max"

  tencent:
    name: "tencent"
    display_name: "腾讯云混元"
    base_url: "https://hunyuan.tencentcloudapi.com"
    api_key_env: "TENCENTCLOUD_SECRET_ID"
    is_available: false
    description: "腾讯云混元大模型"
    website: "https://cloud.tencent.com/product/hunyuan"

  zhipu:
    name: "zhipu"
    display_name: "智谱 GLM"
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    api_key_env: "ZHIPU_API_KEY"
    is_available: true
    description: "智谱 AI 的 GLM 系列模型，包含免费API"
    website: "https://www.bigmodel.cn/"
    models:
      free:
        - id: "glm-4-flash-250414"
          name: "GLM-4 Flash-250414"
          concurrency: 200
          category: "通用模型"
          note: "首个免费API，200并发，128K上下文"
        - id: "glm-4v-flash"
          name: "GLM-4V Flash"
          concurrency: 10
          category: "通用模型"
          note: "免费图像理解，10并发"
        - id: "glm-4.7-flash"
          name: "GLM-4.7 Flash"
          concurrency: 1
          category: "通用模型"
          note: "30B级SOTA，需thinking参数，并发1"
        - id: "glm-4.1v-thinking-flash"
          name: "GLM-4.1V Thinking Flash"
          concurrency: 5
          category: "视觉推理"
          note: "视觉推理+思考，5并发"
        - id: "cogview-3-flash"
          name: "CogView-3 Flash"
          concurrency: 1
          category: "图像生成"
          note: "免费图像生成，不支持流式，并发1"
        - id: "cogvideox-flash"
          name: "CogVideoX Flash"
          concurrency: 3
          category: "视频生成"
          note: "免费视频生成，API调用不可用"
        - id: "glm-4.6v-flash"
          name: "GLM-4.6V Flash"
          concurrency: 1
          category: "视觉理解"
          note: "多模态视觉，并发1"

  ollama:
    name: "ollama"
    display_name: "Ollama (本地)"
    base_url: "http://localhost:11434/v1"
    api_key_env: null  # 本地不需要 API Key
    is_available: false
    description: "Ollama 本地模型运行平台"
    website: "https://ollama.com/"
    models:
      free:
        - id: "llama3"
          name: "Llama 3"
        - id: "mistral"
          name: "Mistral"
        - id: "codellama"
          name: "Code Llama"

  openai:
    name: "openai"
    display_name: "OpenAI"
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    is_available: false
    description: "OpenAI API (需要代理)"
    website: "https://platform.openai.com/"

  deepseek:
    name: "deepseek"
    display_name: "DeepSeek API"
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    is_available: false
    description: "DeepSeek 官方 API"
    website: "https://platform.deepseek.com/"