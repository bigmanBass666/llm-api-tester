# 平台配置
# 所有支持的 API 平台

defaults:
  concurrency: 10
  timeout: 60
  number: 20

platforms:
  nvidia:
    concurrency: 10
    timeout: 30
    name: "nvidia"
    display_name: "NVIDIA NIM"
    base_url: "https://integrate.api.nvidia.com/v1"
    api_key_env: "NVIDIA_API_KEY"  # pragma: allowlist secret
    is_available: true
    description: "NVIDIA NIM 提供的多种开源大模型 API，包含 Qwen、DeepSeek、Llama、GLM 等"
    website: "https://build.nvidia.com"

    # 收藏模型（快速测试用）
    favorites:
      - stepfun-ai/step-3.5-flash
      - moonshotai/kimi-k2.6
      - z-ai/glm-5.1
      - z-ai/glm-4.7
      - minimaxai/minimax-m2.7
      - minimaxai/minimax-m2.5
      - deepseek-ai/deepseek-v4-flash
      - deepseek-ai/deepseek-v4-pro
      - nvidia/nemotron-3-super-120b-a12b

    # 爬虫配置
    scraper:
      base_url: "https://build.nvidia.com"
      page_timeout_ms: 180000
      navigation_timeout_ms: 120000
      page_load_wait_ms: 3000
      pagination_wait_ms: 5000
      network_idle_timeout_ms: 10000
      max_page_turns: 10
      page_size: 96
      max_cards_per_page: 96
      api_timeout_s: 45.0
      api_connect_timeout_s: 15.0
      selectors:
        card_root: "[data-testid='nv-card-root']"
        vendor_link: "a[data-nvtrack-nav-object='artifact-card-publisher-link']"
        model_link: "a[data-nvtrack-nav-object='artifact-card']"
        badge: "[data-testid='nv-badge']"
        next_page: 'button[aria-label="Go to next page"]'
      text_model_categories:
        - text-generation
        - chat
        - coding
        - reasoning
        - language generation
        - instruction following
        - long-context
        - agentic
        - tool calling
        - moe
      non_text_keywords:
        - whisper
        - flux
        - parakeet
        - stable-diffusion
        - nemoretriever
        - esm2
        - nvclip
        - nemotron-parse
        - riva-translate
        - magpie-tts
        - genmol
        - proteinmpnn
        - rfdiffusion
        - shieldgemma
        - nemoguard
        - cosmos-
        - nv-grounding
        - starcoder2
        - openfold
        - ipd/
        - llama-nemotron-embed
        - nv-embed
        - nemotron-asr
        - nemotron-ocr
        - nemotron-table
        - nemotron-page
        - nemotron-graphic
        - parakeet-ctc
        - synthetic-video
        - active-speaker
        - relighting
        - lipsync
        - embedding
        - extraction
        - speech
        - asr
        - tts
        - vision-language
      image_model_categories:
        - image-generation
        - text-to-image
        - image-gen
        - image-editing
      image_model_keywords:
        - flux
        - stable-diffusion
        - sdxl
        - dall-e
        - imagen
        - cogview
      multimodal_categories:
        - vision-language
        - visual-qa
        - image-text-to-text
        - visual-question-answering
      multimodal_keywords:
        - llama-4-maverick
        - llama-4-scout
        - qwen2-vl
        - qwen2.5-vl
        - glm-4v
        - llava
        - phi-3-vision
        - idefics
        - fuyu
        - cogvlm
        - internvl
        - pixtral
      speech_categories:
        - speech
        - asr
        - tts
        - automatic-speech-recognition
        - text-to-speech
      speech_keywords:
        - whisper
        - parakeet
        - riva-translate
        - magpie-tts
        - nemotron-asr
        - parakeet-ctc
      usecase_filters:
        text: "usecase:usecase_text_generation"
        image: "usecase:usecase_text_to_image"
        image_editing: "usecase:usecase_image_editing"
        embedding: "usecase:usecase_retrieval_augmented_generation"
        multimodal: "usecase:usecase_image_to_text"
        speech: "usecase:usecase_speech_to_text"

    # 模型列表（保留原有结构）
    models:
      free:
        - id: "qwen/qwen3-coder-480b-a35b-instruct"
          name: "Qwen3 Coder 480B"
        - id: "minimaxai/minimax-m2.7"
          name: "MiniMax M2.7"
        - id: "deepseek-ai/deepseek-v3.1-terminus"
          name: "DeepSeek V3.1"
        - id: "meta/llama-4-maverick-17b-128e-instruct"
          name: "Llama 4 Maverick"
        - id: "moonshotai/kimi-k2-instruct-0905"
          name: "Kimi K2"
        - id: "google/gemma-7b"
          name: "Gemma 7B"
        - id: "microsoft/phi-3-mini-128k-instruct"
          name: "Phi-3 Mini"
        - id: "stepfun-ai/step-3.5-flash"
          name: "Step 3.5 Flash"
          note: "推理模型，复杂问题可能只输出 reasoning"
        - id: "z-ai/glm4.7"
          name: "GLM 4.7"
          note: "推理模型，需要特殊提示词格式"

